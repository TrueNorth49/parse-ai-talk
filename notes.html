<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speaker Notes — AI as a scout, not a judge</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Archivo:wght@600;800&display=swap" rel="stylesheet">

    <style>
        /* ===========================================
           SPEAKER NOTES — phone-first, bullet layout.
           Notes are embedded as structured data below (NOTES array)
           rather than fetched from the deck. This decouples the
           talking-script bullets from the prose press-N overlay so
           each can be tuned for its own use.
           =========================================== */
        :root {
            --bg: #fafafa;
            --ink: #111111;
            --ink-soft: #2a2a2a;
            --ink-mute: #666666;
            --accent: #ff3300;
            --rule: #d8d8d8;
            --bullet: #b0b0b0;
            --font-body: 'Nunito', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            --font-display: 'Archivo', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--ink-soft);
            line-height: 1.55;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: clamp(1.25rem, 5vw, 2rem) clamp(1.25rem, 5vw, 1.75rem) 5rem;
        }

        /* ===========================================
           HEADER
           =========================================== */
        header {
            margin-bottom: 1.75rem;
            padding-bottom: 1.25rem;
            border-bottom: 2px solid var(--ink);
        }
        header .eyebrow {
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }
        header h1 {
            font-family: var(--font-display);
            font-size: clamp(1.5rem, 6vw, 2rem);
            font-weight: 800;
            line-height: 1.1;
            color: var(--ink);
            letter-spacing: -0.01em;
        }
        header .meta {
            margin-top: 0.6rem;
            font-size: 13px;
            color: var(--ink-mute);
        }
        header .meta a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid var(--accent);
            font-weight: 700;
        }

        /* ===========================================
           NOTE SECTIONS — one per slide
           =========================================== */
        .note-section {
            margin-top: 1.75rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--rule);
            scroll-margin-top: 1rem;
        }
        .note-section:first-of-type {
            margin-top: 0;
            padding-top: 0;
            border-top: none;
        }
        .note-section .folio {
            display: inline-block;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }
        .note-section h2 {
            font-family: var(--font-display);
            font-size: clamp(1.2rem, 5vw, 1.4rem);
            font-weight: 800;
            line-height: 1.2;
            color: var(--ink);
            margin-bottom: 1.1rem;
            letter-spacing: -0.005em;
        }

        /* ===========================================
           GROUPS — beats within a slide
           =========================================== */
        .group {
            margin-top: 1rem;
        }
        .group:first-of-type { margin-top: 0; }

        .group-label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--ink);
            margin-bottom: 0.4rem;
            padding-left: 1.1rem;
            position: relative;
        }
        .group-label::before {
            content: '▸';
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: 700;
        }

        .group ul {
            list-style: none;
            padding-left: 1.1rem;
        }
        .group ul li {
            position: relative;
            padding-left: 1rem;
            font-size: 16px;
            line-height: 1.5;
            color: var(--ink-soft);
            margin-bottom: 0.35rem;
        }
        .group ul li::before {
            content: '•';
            position: absolute;
            left: 0;
            top: -0.05em;
            color: var(--bullet);
            font-weight: 700;
        }
        .group ul li strong {
            color: var(--ink);
            font-weight: 700;
        }

        /* Nested sub-bullets, when a bullet has its own `sub` list */
        .group ul li ul {
            padding-left: 1rem;
            margin-top: 0.35rem;
        }
        .group ul li ul li {
            font-size: 15px;
            color: var(--ink-mute);
            margin-bottom: 0.2rem;
        }
        .group ul li ul li::before {
            content: '–';
            color: var(--bullet);
        }

        /* ===========================================
           TOC TRIGGER + SLIDE-OUT DRAWER
           =========================================== */
        .toc-trigger {
            position: fixed;
            top: 0.85rem;
            right: 0.85rem;
            background: var(--ink);
            color: var(--bg);
            border: none;
            padding: 0.55rem 0.9rem;
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            border-radius: 3px;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            z-index: 100;
        }
        .toc-trigger:hover,
        .toc-trigger:focus { background: var(--accent); outline: none; }

        #toc {
            position: fixed;
            top: 0; right: 0; bottom: 0;
            width: min(85vw, 320px);
            background: var(--ink);
            color: var(--bg);
            padding: 3.5rem 1.25rem 1.5rem;
            overflow-y: auto;
            z-index: 99;
            transform: translateX(105%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: -4px 0 20px rgba(0,0,0,0.3);
        }
        #toc.open { transform: translateX(0); }
        #toc h3 {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1rem;
        }
        #toc a {
            display: block;
            color: var(--bg);
            text-decoration: none;
            padding: 0.7rem 0;
            border-bottom: 1px solid rgba(250,250,250,0.13);
            font-size: 14px;
            font-weight: 600;
            line-height: 1.35;
        }
        #toc a:active { color: var(--accent); }
        #toc a .toc-folio {
            display: block;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.18em;
            color: var(--accent);
            margin-bottom: 0.15rem;
        }

        /* ===========================================
           PRINT
           =========================================== */
        @media print {
            .toc-trigger, #toc { display: none; }
            body { font-size: 11pt; line-height: 1.45; }
            .note-section { page-break-inside: avoid; margin-top: 1.25rem; }
            .group ul li { color: #000; }
        }
    </style>
</head>

                folio: '03 · THE PRINCIPLE',

                            'Old, simple idea: scale human expertise — don’t substitute for it'

                    },

                        ]
                    }

            {

                    },

            },

                    },

                        label: 'What I do',

                            'Corrections saved in a **separate layer** beside algorithm output',
                            'Future reader sees both: machine proposal + my override'

                    }

            {
                folio: '09 · THE WORKSTATION',
                heading: 'Two modes. One dataset.',
                groups: [
                    {
                        label: 'Framing (be honest)',
                        bullets: [
                            '**PARSE was not the goal** — the SK classification was',

                        bullets: [
                            'Scout · second opinion · human-owned decision · full provenance',
                            'What I’d want from ANY AI when the linguist’s name ends up on the final product'
                        ]
                    },
                    {
                        label: 'One last thing (research / tool are separable)',
                        bullets: [
                            'PARSE = the tool',
                            'SK classification = the research',
                            'They’re separable',
                            'If the tool helps your work → take it',
                            'If only the principle transfers → take that'
                        ]
                    },
                    {
                        label: 'Close',
                        bullets: [
                            'Thank you',
                            'Happy to take questions'
                        ]
                    }
                ]
            }
        ];

        /* ===========================================
           RENDER
           =========================================== */
        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // Tiny **bold** → <strong>bold</strong> renderer; HTML-safe by escaping first.
        function renderInline(text) {
            return escapeHtml(text).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        }

        function renderBullet(b) {
            if (typeof b === 'string') {
                return '<li>' + renderInline(b) + '</li>';
            }
            const sub = (b.sub || []).map(renderBullet).join('');
            return '<li>' + renderInline(b.text) + (sub ? '<ul>' + sub + '</ul>' : '') + '</li>';
        }

        function render() {
            const container = document.getElementById('notes-container');
            const tocList = document.getElementById('tocList');
            const bodyParts = [];
            const tocParts = [];

            NOTES.forEach((slide, idx) => {
                const id = 'slide-' + idx;
                const folio = slide.folio || 'SLIDE ' + (idx + 1);
                const heading = slide.heading || '';

                const groupsHtml = (slide.groups || []).map(g => {
                    const bullets = (g.bullets || []).map(renderBullet).join('');
                    return (
                        '<div class="group">' +
                            (g.label ? '<span class="group-label">' + escapeHtml(g.label) + '</span>' : '') +
                            '<ul>' + bullets + '</ul>' +
                        '</div>'
                    );
                }).join('');

                bodyParts.push(
                    '<section class="note-section" id="' + id + '">' +
                        '<span class="folio">' + escapeHtml(folio) + '</span>' +
                        (heading ? '<h2>' + escapeHtml(heading) + '</h2>' : '') +
                        groupsHtml +
                    '</section>'
                );

                tocParts.push(
                    '<a href="#' + id + '">' +
                        '<span class="toc-folio">' + escapeHtml(folio) + '</span>' +
                        escapeHtml(heading || 'Untitled') +
                    '</a>'
                );
            });

            container.innerHTML = bodyParts.join('');
            tocList.innerHTML = tocParts.join('');
        }

        /* ===========================================
           TOC DRAWER INTERACTIONS
           =========================================== */
        const trigger = document.getElementById('tocTrigger');
        const toc = document.getElementById('toc');

        trigger.addEventListener('click', (e) => {
            e.stopPropagation();
            toc.classList.toggle('open');
        });
        toc.addEventListener('click', (e) => {
            if (e.target.closest('a')) toc.classList.remove('open');
        });
        document.addEventListener('click', (e) => {
            if (toc.classList.contains('open') && !toc.contains(e.target) && !trigger.contains(e.target)) {
                toc.classList.remove('open');
            }
        });

        render();
    </script>
</body>
</html>
